bundle:
  name: pizzatel-provisioning

variables:
  catalog:
    description: UC catalog that already holds the synth_* data (read-only) and will hold pizzatel.*
    default: jmrdemo
  demo_schema:
    description: Schema for demo-owned curated tables
    default: pizzatel
  export_volume:
    description: Volume name for offline export files
    default: exports

include:
  - resources/*.yml

targets:
  dev:
    default: true
    # No `mode: development` on purpose: pizzatel is a SHARED, canonical demo schema
    # (jmrdemo.pizzatel), not a per-developer sandbox. dev-mode prefixes UC schema names to
    # dev_<user>_pizzatel, which defeats the intent and breaks the downstream products.json
    # contract. Omitting mode keeps schema/volume/job names deterministic.
    workspace:
      profile: DEFAULT
